name: Model Card Builder

"on":
  issues:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      model_url:
        description: 'Hugging Face model URL'
        required: true
        type: string

permissions:
  issues: write
  contents: write
  models: read

concurrency:
  group: model-card-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build_model_card:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'generate-model-card' &&
        contains(github.event.issue.body, 'huggingface.co/')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create assets directory
        run: mkdir -p assets

      - name: Extract Hugging Face URL
        id: extract-url
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            URL="${{ github.event.inputs.model_url }}"
          else
            URL=$(echo "${{ github.event.issue.body }}" | grep -o 'https://huggingface.co/[^ ]*' | head -n1)
          fi
          if [[ -z "$URL" ]]; then
            echo "Error: No valid Hugging Face URL found"
            exit 1
          fi
          REPO_ID=$(echo "$URL" | sed 's|https://huggingface.co/||')
          echo "repo_id=$REPO_ID" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Found model URL: $URL"

      - name: Fetch model card data
        id: fetch-data
        continue-on-error: true
        run: |
          echo "Fetching data from ${{ steps.extract-url.outputs.url }}"
          python fetch_hf_model_card.py "${{ steps.extract-url.outputs.url }}" 2>&1 | tee fetch.log
          if [ ! -f "model_data.json" ]; then
            echo "::error::Failed to generate model_data.json"
            exit 1
          fi
          echo "Successfully generated model_data.json"

      - name: Summarize model card
        id: summarize-model
        if: success() || steps.fetch-data.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Generating structured summary for ${{ steps.extract-url.outputs.repo_id }}"
          python summarize_model_card.py --url "${{ steps.extract-url.outputs.url }}" --data model_data.json --prompt summarize.prompt.yaml --recovery-prompt recover_model_card_facets.prompt.yaml 2>&1 | tee summary.log

      - name: Generate HTML summary
        id: generate-html
        if: success() || steps.fetch-data.outcome == 'success'
        run: |
          echo "Generating HTML for ${{ steps.extract-url.outputs.repo_id }}"
          python build.py --data model_data.json 2>&1 | tee build.log
          if [ ! -f "Model_Card.html" ]; then
            echo "::error::Failed to generate Model_Card.html"
            exit 1
          fi
          echo "Successfully generated Model_Card.html"

      - name: Extract and normalize model metadata
        id: model-metadata
        if: success() || steps.generate-html.outcome == 'success'
        run: |
          python << 'EOF'
          import json
          import re
          from datetime import datetime
          
          # Read model_data.json
          with open('model_data.json', 'r') as f:
              model_data = json.load(f)
          
          # Extract fields
          model_id = "${{ steps.extract-url.outputs.repo_id }}"
          model_url = "${{ steps.extract-url.outputs.url }}"
          
          # Parse organization from URL (e.g., https://huggingface.co/NMFS-OSI/yolo11m-... → NMFS-OSI)
          org_match = re.search(r'huggingface\.co/([^/]+)/', model_url)
          organization = org_match.group(1) if org_match else "unknown"
          
          # Get pipeline_type from model data
          pipeline_type = model_data.get("model", {}).get("task_name", "other")
          if not pipeline_type or pipeline_type == "unknown":
              pipeline_type = "other"
          
          # Get model name
          model_name = model_data.get("model", {}).get("model_id", model_id).replace("-", " ").title()
          
          # Get description (first 200 chars of overview/summary)
          description = (model_data.get("overview", "")[:200] or 
                         model_data.get("generated_summary", "")[:200] or 
                         "A machine learning model").rstrip()
          if len(description) < 200 and model_data.get("overview"):
              description = model_data.get("overview", "")[:200]
          
          # Output for next steps using GITHUB_OUTPUT (replaces deprecated set-output)
          import os
          github_output = os.environ.get('GITHUB_OUTPUT', '')
          if github_output:
              with open(github_output, 'a') as fh:
                  fh.write(f"model_id={model_id}\n")
                  fh.write(f"model_name={model_name}\n")
                  fh.write(f"model_url={model_url}\n")
                  fh.write(f"pipeline_type={pipeline_type}\n")
                  fh.write(f"organization={organization}\n")
                  fh.write(f"description={description}\n")
          EOF

      - name: Archive model card in gallery
        if: success() || steps.model-metadata.outcome == 'success'
        run: |
          MODEL_ID="${{ steps.model-metadata.outputs.model_id }}"
          mkdir -p "$(dirname "gallery/cards/${MODEL_ID}.html")"
          cp Model_Card.html "gallery/cards/${MODEL_ID}.html"
          echo "Archived card as gallery/cards/${MODEL_ID}.html"

      - name: Update gallery registry
        id: update-registry
        if: success() || steps.model-metadata.outcome == 'success'
        continue-on-error: true
        run: |
          python update_gallery_registry.py add \
            --model-id "${{ steps.model-metadata.outputs.model_id }}" \
            --model-name "${{ steps.model-metadata.outputs.model_name }}" \
            --model-url "${{ steps.model-metadata.outputs.model_url }}" \
            --pipeline-type "${{ steps.model-metadata.outputs.pipeline_type }}" \
            --organization "${{ steps.model-metadata.outputs.organization }}" \
            --description "${{ steps.model-metadata.outputs.description }}"
          
          if [ $? -eq 0 ]; then
            echo "::notice::Registry updated successfully"
          else
            echo "::warning::Registry update had issues (may be duplicate)"
          fi

      - name: Regenerate gallery index
        if: success() || steps.update-registry.outcome != 'failure'
        run: |
          python generate_gallery.py --registry gallery/cards.json --output gallery/index.html
          echo "Generated gallery/index.html with updated cards"

      - name: Sync gallery to docs for GitHub Pages
        if: success() || steps.update-registry.outcome != 'failure'
        run: |
          mkdir -p docs/gallery
          cp -r gallery/* docs/gallery/
          echo "✓ Synced gallery to docs/gallery/ for GitHub Pages"
          echo "   Live URL: https://MichaelAkridge-NOAA.github.io/model-card-template/gallery/"

      - name: Commit gallery updates
        if: success() || steps.update-registry.outcome != 'failure'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if gallery files changed
          if git diff --quiet gallery/ docs/gallery/ 2>/dev/null; then
            echo "No changes to gallery"
          else
            git add gallery/ docs/gallery/
            git commit -m "chore: update model gallery [skip ci]
          
          Generated by GitHub Actions model card builder
          - Added/updated model card for ${{ steps.model-metadata.outputs.model_id }}
          - Registry now includes ${{ steps.model-metadata.outputs.model_name }}
          - Gallery synced to docs/ for GitHub Pages
          
          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push
            echo "Gallery updates committed to main and synced to GitHub Pages"
          fi

      - name: Upload HTML artifact
        if: success() || steps.generate-html.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: model-card-html
          path: |
            Model_Card.html
            model_data.json
            fetch.log
            summary.log
            build.log

      - name: Comment on issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODEL_NAME="${{ steps.extract-url.outputs.repo_id }}"
          STATUS=""
          if [[ "${{ steps.generate-html.outcome }}" == "success" ]]; then
            STATUS="✅ Successfully generated"
          else
            STATUS="⚠️ Generated with some warnings"
          fi
          
          gh issue comment ${{ github.event.issue.number }} --body "### 📄 Model Card $STATUS
          
          Generated summary for model: \`$MODEL_NAME\`
          
          To access the generated files:
          1. Go to the [workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})
          2. Scroll to the Artifacts section
          3. Download \`model-card-html\` to get:
             - The HTML summary
             - Raw model data (JSON)
             - Summary logs
             - Build logs
          
          Generated using [NOAA Model Card Template](https://github.com/noaa-fisheries/model-card-template)
          
          ---
          *If you notice any issues, please check the build logs in the artifacts*"

      - name: Close issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Closing this request now that the model card has been generated."
